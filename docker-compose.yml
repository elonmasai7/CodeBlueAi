# Code Blue AI - Autonomous Clinical Emergency Agent Network
# When seconds matter, agents assemble instantly.

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: codeblue
      POSTGRES_PASSWORD: codeblue_secret
      POSTGRES_DB: codeblue
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeblue"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  hapi_fhir:
    image: hapiproject/hapi:v7.4.0
    ports:
      - "8080:8080"
    environment:
      HAPI_DB_HOST: postgres
      HAPI_DB_PORT: 5432
      HAPI_DB_NAME: codeblue
      HAPI_DB_USER: codeblue
      HAPI_DB_PASSWORD: codeblue_secret
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://codeblue:codeblue_secret@postgres:5432/codeblue
      - REDIS_URL=redis://redis:6379
      - FHIR_BASE_URL=http://hapi_fhir:8080/fhir
      - JWT_SECRET=change_in_production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://codeblue:codeblue_secret@postgres:5432/codeblue
      - REDIS_URL=redis://redis:6379
      - FHIR_BASE_URL=http://hapi_fhir:8080/fhir
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  redis_data:
  grafana_data:
